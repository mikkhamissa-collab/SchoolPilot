services:
  - type: web
    name: schoolpilot-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: oregon
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: CREDENTIAL_ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGINS
        value: '["https://schoolpilot.co","https://www.schoolpilot.co","https://app.schoolpilot.co"]'
      - key: CORS_ORIGIN_REGEX
        value: 'https://.*\\.vercel\\.app'
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
    healthCheckPath: /health
